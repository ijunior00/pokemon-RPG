{% extends "base.html" %}
{% block title %}Registrar{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>⚡ Pokémon 5e RPG</h1>
            <p>Criar nova conta</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Nome de Usuário</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="role">Tipo de Conta</label>
                <select id="role" name="role" onchange="toggleInviteField(this.value)">
                    <option value="player">Jogador</option>
                    <option value="master">Mestre (cria uma mesa)</option>
                </select>
            </div>
            <div class="form-group" id="invite-field">
                <label for="invite_code">Código de Convite da Mesa</label>
                <input type="text" id="invite_code" name="invite_code" placeholder="Ex: A3F9C2" style="text-transform:uppercase;" maxlength="6">
                <small style="color:var(--text-muted);">Peça ao seu Mestre o código de convite da mesa.</small>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Criar Conta</button>
<script>
function toggleInviteField(role) {
    document.getElementById('invite-field').style.display = role === 'player' ? '' : 'none';
}
toggleInviteField('player');
</script>
        </form>
        <div class="auth-footer">
            <a href="{{ url_for('login') }}">Já tenho conta</a>
        </div>
    </div>
</div>
{% endblock %}
