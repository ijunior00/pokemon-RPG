databases:
  - name: pokemon5e-db
    plan: free
    databaseName: pokemon5e
    user: pokemon5e

services:
  - type: web
    name: pokemon5e-rpg
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      # Conecta automaticamente ao banco PostgreSQL declarado acima.
      # Era a causa do "Exited with status 1" no deploy: sem DATABASE_URL
      # o app aborta o boot (database.py exige a connection string).
      - key: DATABASE_URL
        fromDatabase:
          name: pokemon5e-db
          property: connectionString
      # Chave de sessão gerada uma vez pelo Render (evita o segredo padrão).
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: true
